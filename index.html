<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golds-beer | Gestão Rápida</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #121212;
            --card: #1e1e1e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .container {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #333;
            text-align: center;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            color: var(--gold);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.3rem;
        }

        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 12px;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        input:focus, textarea:focus {
            border-color: var(--gold);
        }

        .toggle-pass {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            background: #2a2a2a;
            padding: 5px;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:active {
            transform: scale(0.98);
            background: #b8962d;
        }

        .hidden {
            display: none !important;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .tab-btn {
            background: #333;
            color: #888;
            padding: 10px;
            font-size: 0.75rem;
            flex: 1;
            border-radius: 5px;
            border: 1px solid #444;
            font-weight: bold;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--gold);
            color: black;
        }

        #log-lista {
            text-align: left;
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-top: 15px;
        }

        .lista-itens {
            max-height: 420px;
            overflow-y: auto;
        }

        .item {
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item b {
            color: var(--gold);
            font-size: 1.1rem;
        }

        .detalhes {
            display: block;
            color: #ccc;
            margin-top: 4px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .atendente-tag {
            font-size: 0.75rem;
            color: #777;
            display: block;
            margin-top: 3px;
            font-style: italic;
        }

        .confirmado-tag {
            font-size: 0.75rem;
            color: #98db98;
            display: block;
            margin-top: 3px;
            font-style: italic;
        }

        .loading {
            color: var(--gold);
            font-size: 0.8rem;
            display: block;
            text-align: center;
            margin-bottom: 10px;
        }

        .status-badge {
            display: inline-block;
            margin-left: 8px;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-aberto {
            background: #6a5200;
            color: #fff1b0;
        }

        .status-confirmado {
            background: #165c16;
            color: #b9ffb9;
        }

        .preview-img,
        .item-img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            border: 1px solid #333;
            object-fit: cover;
            max-height: 220px;
        }

        .small-tip {
            color: #888;
            font-size: 0.78rem;
            text-align: left;
            margin-top: -4px;
            margin-bottom: 10px;
        }

        .logout-btn {
            background: transparent;
            color: gray;
            border: 1px solid #333;
            margin-top: 20px;
            font-size: 0.75rem;
        }

        .pedido-box {
            margin-top: 6px;
            color: #f0f0f0;
            font-size: 0.92rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="container">
        <h2>GOLDS-BEER</h2>

        <div class="input-group">
            <input type="text" id="user" placeholder="USUÁRIO">
        </div>

        <div class="input-group">
            <input type="password" id="pass" placeholder="SENHA">
            <span class="toggle-pass" onclick="togglePassword()">VER</span>
        </div>

        <button onclick="verificarLogin()">ENTRAR</button>
    </div>

    <div id="main-screen" class="container hidden">
        <h2 id="welcome-msg">CARREGANDO...</h2>

        <div id="area-registro" class="hidden">
            <input type="text" id="numComanda" placeholder="NÚMERO DA COMANDA" inputmode="numeric" oninput="mostrarUltimos4()">
            <div class="small-tip">O sistema salva apenas os 4 últimos números.</div>

            <input type="text" id="ultimos4" placeholder="ÚLTIMOS 4 NÚMEROS" readonly>

            <div style="margin-top:10px;">
                <input type="text" id="pedido" placeholder="PEDIDO (EX: BRAHMA 600)">
            </div>

            <div style="margin-top:10px;">
                <input type="file" id="fotoComanda" accept="image/*" capture="environment" onchange="carregarFoto(event)">
            </div>

            <img id="previewFoto" class="preview-img hidden" alt="Prévia da comanda">

            <button id="btn-registrar" onclick="registrarComanda()">REGISTRAR COMANDA</button>
        </div>

        <div id="area-abas" class="tabs hidden">
            <button class="tab-btn active" id="tab-pend" onclick="mudarAba('aberto')">EM ABERTO</button>
            <button class="tab-btn" id="tab-incl" onclick="mudarAba('confirmado')">CONFIRMADOS</button>
        </div>

        <div id="log-lista">
            <span id="status-carga" class="loading hidden">Sincronizando...</span>
            <div id="itens" class="lista-itens">Buscando dados...</div>
            <button id="btn-limpar" class="hidden" onclick="limparHistorico()" style="width:100%; padding:8px; background:#8b0000; color:white; margin-top:15px; font-size:0.7rem; border-radius:5px; border:none;">LIMPAR HISTÓRICO</button>
        </div>

        <button onclick="fazerLogout()" class="logout-btn">SAIR DO SISTEMA</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyh6KGmqjDlI2MxyHdQ-lwimvGq863kV-JymTJNKFJuOnt6LlDhGVSIkmim3LljdRwNDw/exec";

        const ACESSOS = {
            "matheus": { senha: "Goldsbeer1003", tipo: "atendente", nome: "Matheus" },
            "alex th": { senha: "Goldsbeer11", tipo: "atendente", nome: "Alex Th" },
            "novo": { senha: "teste123", tipo: "atendente", nome: "Novo" },
            "comferencia": { senha: "admingoldsbeer2026", tipo: "conferencia", nome: "Conferência" }
        };

        let usuarioLogado = "";
        let nomeAtendente = "";
        let tipoUsuario = "";
        let abaAtual = "aberto";
        let cachePedidos = [];
        let fotoBase64 = "";
        let intervaloAtualizacao = null;

        window.onload = function () {
            const u = localStorage.getItem('gb_user');
            if (u && ACESSOS[u]) {
                usuarioLogado = u;
                nomeAtendente = ACESSOS[u].nome;
                tipoUsuario = ACESSOS[u].tipo;
                iniciarPainel();
            }
        };

        function togglePassword() {
            const c = document.getElementById('pass');
            c.type = c.type === "password" ? "text" : "password";
        }

        function verificarLogin() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();

            if (ACESSOS[u] && ACESSOS[u].senha === p) {
                usuarioLogado = u;
                nomeAtendente = ACESSOS[u].nome;
                tipoUsuario = ACESSOS[u].tipo;
                localStorage.setItem('gb_user', u);
                iniciarPainel();
            } else {
                alert("Usuário ou senha incorretos!");
            }
        }

        function iniciarPainel() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');

            document.getElementById('welcome-msg').innerText =
                tipoUsuario === "conferencia"
                    ? "OLÁ, CONFERÊNCIA"
                    : "OLÁ, " + nomeAtendente.toUpperCase();

            if (tipoUsuario === "conferencia") {
                document.getElementById('area-registro').classList.add('hidden');
                document.getElementById('area-abas').classList.remove('hidden');
                document.getElementById('btn-limpar').classList.remove('hidden');
            } else {
                document.getElementById('area-registro').classList.remove('hidden');
                document.getElementById('area-abas').classList.add('hidden');
                document.getElementById('btn-limpar').classList.add('hidden');
            }

            atualizarDados();

            if (intervaloAtualizacao) clearInterval(intervaloAtualizacao);
            intervaloAtualizacao = setInterval(atualizarDados, 10000);
        }

        function mostrarUltimos4() {
            const valor = document.getElementById('numComanda').value.replace(/\D/g, '');
            document.getElementById('ultimos4').value = valor.slice(-4);
        }

        function carregarFoto(event) {
            const arquivo = event.target.files[0];
            const preview = document.getElementById('previewFoto');

            if (!arquivo) {
                fotoBase64 = "";
                preview.src = "";
                preview.classList.add('hidden');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                fotoBase64 = e.target.result;
                preview.src = fotoBase64;
                preview.classList.remove('hidden');
            };
            reader.readAsDataURL(arquivo);
        }

        async function registrarComanda() {
            const numeroCompleto = document.getElementById('numComanda').value.replace(/\D/g, '');
            const ultimos4 = numeroCompleto.slice(-4);
            const pedido = document.getElementById('pedido').value.trim();

            if (!numeroCompleto || ultimos4.length < 4) {
                alert("Digite a comanda. É preciso ter pelo menos 4 números.");
                return;
            }

            if (!pedido) {
                alert("Digite o pedido do cliente.");
                return;
            }

            const btn = document.getElementById('btn-registrar');
            btn.disabled = true;
            btn.innerText = "REGISTRANDO...";

            const payload = {
                action: 'add',
                id: Date.now().toString(),
                numero: numeroCompleto,
                pedido: pedido,
                foto: fotoBase64 || "",
                atendente: nomeAtendente
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                document.getElementById('numComanda').value = "";
                document.getElementById('ultimos4').value = "";
                document.getElementById('pedido').value = "";
                document.getElementById('fotoComanda').value = "";
                document.getElementById('previewFoto').src = "";
                document.getElementById('previewFoto').classList.add('hidden');
                fotoBase64 = "";

                await atualizarDados();
            } catch (e) {
                alert("Erro de conexão!");
            }

            btn.disabled = false;
            btn.innerText = "REGISTRAR COMANDA";
        }

        async function atualizarDados() {
            document.getElementById('status-carga').classList.remove('hidden');

            try {
                const r = await fetch(SCRIPT_URL);
                const dados = await r.json();
                cachePedidos = Array.isArray(dados) ? dados : [];
                renderizarLista(cachePedidos);
            } catch (e) {
                document.getElementById('itens').innerHTML = "<p style='color:#444; text-align:center;'>Erro ao carregar dados</p>";
            }

            document.getElementById('status-carga').classList.add('hidden');
        }

        function mudarAba(aba) {
            abaAtual = aba;
            renderizarLista(cachePedidos);
        }

        async function marcarAprovado(id) {
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'confirmar',
                        id: id,
                        usuario: nomeAtendente || "Conferência"
                    })
                });
                atualizarDados();
            } catch (e) {
                alert("Erro ao confirmar!");
            }
        }

        function obterStatus(item) {
            if (item.status) return String(item.status).toLowerCase();
            return "aberto";
        }

        function obterNumero(item) {
            if (item.comanda) return item.comanda;
            if (item.numero) return String(item.numero).slice(-4);
            return "----";
        }

        function obterDataHora(item) {
            return item.data || "--:--";
        }

        function obterConfirmadoPor(item) {
            return item.confirmado || "";
        }

        function obterPedido(item) {
            return item.pedido || "";
        }

        function renderizarLista(lista) {
            const box = document.getElementById('itens');

            let filtrados = lista.map(item => ({
                ...item,
                _status: obterStatus(item),
                _numero: obterNumero(item),
                _dataHora: obterDataHora(item),
                _confirmadoPor: obterConfirmadoPor(item),
                _pedido: obterPedido(item)
            }));

            if (tipoUsuario === "conferencia") {
                filtrados = filtrados.filter(p => p._status === abaAtual);
            } else {
                filtrados = filtrados.filter(p => p._status === "aberto");
            }

            document.getElementById('tab-pend').className = abaAtual === 'aberto' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tab-incl').className = abaAtual === 'confirmado' ? 'tab-btn active' : 'tab-btn';

            if (filtrados.length === 0) {
                box.innerHTML = "<p style='color:#444; text-align:center;'>Nenhum registro</p>";
                return;
            }

            box.innerHTML = filtrados.reverse().map(p => `
                <div class="item">
                    <div>
                        <span>
                            <b># ${p._numero}</b>
                            <span class="status-badge ${p._status === 'confirmado' ? 'status-confirmado' : 'status-aberto'}">
                                ${p._status === 'confirmado' ? 'confirmado' : 'em aberto'}
                            </span>
                        </span>

                        <span class="detalhes">Data/Hora: ${p._dataHora}</span>
                        <span class="atendente-tag">Por: ${p.atendente || '---'}</span>

                        ${p._pedido ? `<div class="pedido-box"><strong>Pedido:</strong> ${p._pedido}</div>` : ''}

                        ${p._confirmadoPor ? `<span class="confirmado-tag">Confirmado por: ${p._confirmadoPor}</span>` : ''}

                        ${p.foto ? `<img class="item-img" src="${p.foto}" alt="Foto da comanda">` : ''}

                        ${tipoUsuario === "conferencia" && p._status === "aberto"
                            ? `<button onclick="marcarAprovado('${p.id}')" style="margin-top:10px;">CONFIRMAR INCLUSÃO</button>`
                            : ''
                        }
                    </div>
                </div>
            `).join('');
        }

        function fazerLogout() {
            localStorage.removeItem('gb_user');
            location.reload();
        }

        async function limparHistorico() {
            if (confirm("Deseja apagar TODO o histórico?")) {
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'clear' })
                    });
                    atualizarDados();
                } catch (e) {
                    alert("Erro ao limpar histórico!");
                }
            }
        }
    </script>
</body>
</html>
