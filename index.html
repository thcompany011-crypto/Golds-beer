<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golds-beer | Gestão Rápida</title>
    <style>
        :root { --gold: #d4af37; --dark: #121212; --card: #1e1e1e; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        .container { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--gold); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; font-size: 1.3rem; }
        .input-group { position: relative; width: 100%; margin-bottom: 12px; }
        input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--gold); }
        .toggle-pass { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--gold); cursor: pointer; font-size: 0.75rem; font-weight: bold; background: #2a2a2a; padding: 5px; border-radius: 4px; }
        button { width: 100%; padding: 14px; background: var(--gold); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; text-transform: uppercase; transition: 0.3s; }
        button:active { transform: scale(0.98); background: #b8962d; }
        .hidden { display: none; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { background: #333; color: #888; padding: 10px; font-size: 0.75rem; flex: 1; border-radius: 5px; border: 1px solid #444; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: black; }
        /* MEMÓRIA RÁPIDA */
        .quick-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; justify-content: center; }
        .tag-btn { background: #2a2a2a; border: 1px solid var(--gold); color: var(--gold); padding: 7px 14px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; }
        #log-lista { text-align: left; background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-top: 15px; }
        .lista-itens { max-height: 380px; overflow-y: auto; }
        .item { padding: 12px 0; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; }
        .item-info { flex-grow: 1; }
        .item b { color: var(--gold); font-size: 1.1rem; }
        .detalhes { display: block; color: #ccc; margin-top: 4px; font-size: 0.9rem; font-weight: 500; }
        .atendente-tag { font-size: 0.75rem; color: #777; display: block; margin-top: 3px; font-style: italic; }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--gold); cursor: pointer; }
        .loading { color: var(--gold); font-size: 0.8rem; display: block; text-align: center; margin-bottom: 10px; }
        /* MODAL PERSONALIZADO */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="login-screen" class="container">
        <h2>GOLDS-BEER</h2>
        <div class="input-group"><input type="text" id="user" placeholder="USUÁRIO"></div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="SENHA">
            <span class="toggle-pass" onclick="togglePassword()">VER</span>
        </div>
        <button onclick="verificarLogin()">ENTRAR</button>
    </div>

    <div id="main-screen" class="container hidden">
        <h2 id="welcome-msg">CARREGANDO...</h2>
        
        <div id="area-registro">
            <input type="number" id="numComanda" placeholder="Nº COMANDA" inputmode="numeric">
            <div style="margin-top:10px;">
                <input type="text" id="detalhePedido" placeholder="PEDIDO (EX: BRAHMA 600)">
            </div>
            <div id="quick-suggestions" class="quick-tags"></div>
            <button id="btn-registrar" onclick="registrarComanda()">REGISTRAR PEDIDO</button>
        </div>

        <div id="area-abas" class="tabs hidden">
            <button class="tab-btn active" id="tab-pend" onclick="mudarAba('pendentes')">PENDENTES</button>
            <button class="tab-btn" id="tab-incl" onclick="mudarAba('incluidos')">INCLUÍDOS</button>
        </div>
        
        <div id="log-lista">
            <span id="status-carga" class="loading hidden">Sincronizando com Bling...</span>
            <div id="itens" class="lista-itens">Buscando dados...</div>
            <button id="btn-limpar" class="hidden" onclick="limparHistorico()" style="width:100%; padding:8px; background:#8b0000; color:white; margin-top:15px; font-size:0.7rem; border-radius:5px; border:none;">LIMPAR HISTÓRICO</button>
        </div>
        <button onclick="fazerLogout()" style="background:transparent; color:gray; border:1px solid #333; margin-top:20px; font-size:0.75rem;">SAIR DO SISTEMA</button>
    </div>

    <script>
        // COLOQUE O LINK DO SEU APPS SCRIPT AQUI:
        const SCRIPT_URL = "SUA_NOVA_URL_AQUI";
        
        const ACESSOS = { "atendentes": "Goldsbeer", "geral": "Goldsbeer2026" };
        let usuarioLogado = "";
        let nomeAtendente = "";
        let abaAtual = "pendentes";
        let cachePedidos = [];

        window.onload = function() {
            const u = localStorage.getItem('gb_user');
            const n = localStorage.getItem('gb_nome');
            if (u && ACESSOS[u]) {
                usuarioLogado = u;
                nomeAtendente = n || "Atendente";
                iniciarPainel();
            }
            carregarSugestoes();
        };

        function togglePassword() {
            const c = document.getElementById('pass');
            c.type = c.type === "password" ? "text" : "password";
        }

        function verificarLogin() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();
            if (ACESSOS[u] === p) {
                usuarioLogado = u;
                localStorage.setItem('gb_user', u);
                if (u === "atendentes") abrirModalNome(); else iniciarPainel();
            } else { alert("Senha incorreta!"); }
        }

        function abrirModalNome() {
            const m = document.createElement('div');
            m.id = "modal-nome";
            m.className = "modal-overlay";
            m.innerHTML = `<div class="container" style="max-width:320px; border:2px solid var(--gold);">
                <h2 style="font-size:1.1rem;">QUEM ESTÁ ATENDENDO?</h2>
                <input type="text" id="input-nome-atendente" placeholder="DIGITE SEU NOME" style="margin-bottom:15px;">
                <button onclick="confirmarNomeAtendente()">CONFIRMAR</button>
            </div>`;
            document.body.appendChild(m);
            document.getElementById('input-nome-atendente').focus();
        }

        function confirmarNomeAtendente() {
            const n = document.getElementById('input-nome-atendente').value.trim();
            if (n) {
                nomeAtendente = n;
                localStorage.setItem('gb_nome', n);
                document.getElementById('modal-nome').remove();
                iniciarPainel();
            } else { alert("Digite seu nome!"); }
        }

        function iniciarPainel() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = usuarioLogado === "geral" ? "OLÁ, CAIXA" : "OLÁ, " + nomeAtendente.toUpperCase();
            
            if(usuarioLogado === "geral") {
                document.getElementById('area-registro').classList.add('hidden');
                document.getElementById('area-abas').classList.remove('hidden');
                document.getElementById('btn-limpar').classList.remove('hidden');
            }
            atualizarDados();
            setInterval(atualizarDados, 10000);
        }

        async function registrarComanda() {
            const n = document.getElementById('numComanda').value;
            const d = document.getElementById('detalhePedido').value;
            if(!n || !d) return alert("Preencha Nº e Pedido!");
            
            salvarSugestao(d);
            const btn = document.getElementById('btn-registrar');
            btn.disabled = true; btn.innerText = "REGISTRANDO...";

            const p = { action: 'add', id: Date.now(), numero: n, pedido: d, atendente: nomeAtendente, hora: new Date().toISOString() };
            
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(p) });
                document.getElementById('numComanda').value = "";
                document.getElementById('detalhePedido').value = "";
                atualizarDados();
            } catch(e) { alert("Erro de conexão!"); }
            btn.disabled = false; btn.innerText = "REGISTRAR PEDIDO";
        }

        function carregarSugestoes() {
            const s = JSON.parse(localStorage.getItem('gb_sugestoes') || "[]");
            const tags = s.slice(-5).reverse().map(t => `<span class="tag-btn" onclick="document.getElementById('detalhePedido').value='${t}'">${t}</span>`).join('');
            document.getElementById('quick-suggestions').innerHTML = tags;
        }

        function salvarSugestao(t) {
            let s = JSON.parse(localStorage.getItem('gb_sugestoes') || "[]");
            s = s.filter(x => x !== t); s.push(t);
            localStorage.setItem('gb_sugestoes', JSON.stringify(s.slice(-10)));
            carregarSugestoes();
        }

        async function atualizarDados() {
            document.getElementById('status-carga').classList.remove('hidden');
            try {
                const r = await fetch(SCRIPT_URL);
                cachePedidos = await r.json();
                renderizarLista(cachePedidos);
            } catch (e) { }
            document.getElementById('status-carga').classList.add('hidden');
        }

        function mudarAba(aba) { abaAtual = aba; renderizarLista(cachePedidos); }

        async function marcarAprovado(id, val) {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'approve', id: id, value: val }) });
            atualizarDados();
        }

        function renderizarLista(lista) {
            const box = document.getElementById('itens');
            let filtrados = usuarioLogado === "geral" ? lista.filter(p => abaAtual === 'pendentes' ? !p.aprovado : p.aprovado) : lista;
            
            document.getElementById('tab-pend').className = abaAtual === 'pendentes' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tab-incl').className = abaAtual === 'incluidos' ? 'tab-btn active' : 'tab-btn';

            if (filtrados.length === 0) { box.innerHTML = "<p style='color:#444; text-align:center;'>Nenhum registro</p>"; return; }
            
            box.innerHTML = filtrados.map(p => `
                <div class="item">
                    ${usuarioLogado === "geral" ? `<input type="checkbox" ${p.aprovado ? 'checked' : ''} onclick="marcarAprovado(${p.id}, this.checked)">` : ''}
                    <div class="item-info">
                        <span><b># ${p.numero}</b> - ${p.hora}</span>
                        <span class="detalhes">${p.pedido}</span>
                        <span class="atendente-tag">Por: ${p.atendente || 'Sistema'}</span>
                    </div>
                </div>
            `).reverse().join('');
        }

        function fazerLogout() { localStorage.clear(); location.reload(); }
        async function limparHistorico() { if(confirm("Deseja apagar TODO o histórico da planilha?")) { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'clear' }) }); atualizarDados(); } }
    </script>
</body>
</html>
