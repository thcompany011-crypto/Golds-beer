<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golds-beer | Sistema</title>
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    <style>
        :root { --gold: #d4af37; --dark: #121212; --card: #1e1e1e; }
        body { background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--gold); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .pass-wrapper { position: relative; width: 100%; margin: 10px 0; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--gold); }
        .toggle-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--gold); font-size: 0.7rem; background: none; border: none; font-weight: bold; }
        button { width: 100%; padding: 14px; background: var(--gold); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .hidden { display: none; }
        #log-lista { text-align: left; margin-top: 20px; background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .lista-itens { max-height: 250px; overflow-y: auto; margin-top: 10px; }
        .item { padding: 8px 0; border-bottom: 1px solid #222; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .item b { color: var(--gold); }
    </style>
</head>
<body>

    <div id="login-screen" class="container">
        <h2>GOLDS-BEER</h2>
        <input type="text" id="user" placeholder="Usuário">
        <div class="pass-wrapper">
            <input type="password" id="pass" placeholder="Senha">
            <button class="toggle-btn" onclick="togglePass()">VER</button>
        </div>
        <button onclick="verificarLogin()">ENTRAR NO SISTEMA</button>
    </div>

    <div id="main-screen" class="container hidden">
        <h2 id="welcome-msg">Painel</h2>
        <input type="number" id="numComanda" placeholder="4 últimos dígitos" style="text-align: center; font-size: 1.2rem;">
        <button onclick="registrarComanda()">REGISTRAR COMANDA</button>
        
        <div id="log-lista">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <small style="color: #666;">HISTÓRICO:</small>
                <button onclick="limparHistorico()" style="width: auto; padding: 5px; font-size: 0.6rem; background: #444; color: #ccc; margin: 0;">LIMPAR</button>
            </div>
            <div id="itens" class="lista-itens"></div>
        </div>
        
        <button onclick="location.reload()" style="background:transparent; color:gray; border:1px solid #333; margin-top:20px;">SAIR</button>
    </div>

    <script>
        const ACESSOS = { "atendentes": "Goldsbeer", "geral": "Goldsbeer2026" };

        function togglePass() {
            const p = document.getElementById('pass');
            const btn = document.querySelector('.toggle-btn');
            p.type = p.type === "password" ? "text" : "password";
            btn.innerText = p.type === "password" ? "VER" : "OCULTAR";
        }

        function verificarLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (ACESSOS[u] && ACESSOS[u] === p) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = "Olá, " + u;
                carregarDadosSalvos();
            } else { alert("Usuário ou Senha incorretos!"); }
        }

        function registrarComanda() {
            const n = document.getElementById('numComanda').value;
            if(n.length < 4) return alert("Digite 4 números.");
            const hora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            let historico = JSON.parse(localStorage.getItem('golds_history') || "[]");
            historico.unshift({ numero: n, hora: hora });
            localStorage.setItem('golds_history', JSON.stringify(historico));
            document.getElementById('numComanda').value = "";
            renderizarLista(historico);
        }

        function carregarDadosSalvos() {
            renderizarLista(JSON.parse(localStorage.getItem('golds_history') || "[]"));
        }

        function renderizarLista(lista) {
            document.getElementById('itens').innerHTML = lista.map(item => `
                <div class="item"><span><b># ${item.numero}</b></span><span style="color:#666;">${item.hora}</span></div>
            `).join('');
        }

        function limparHistorico() {
            if(confirm("Apagar histórico?")) {
                localStorage.removeItem('golds_history');
                renderizarLista([]);
            }
        }
    </script>
</body>
</html>
